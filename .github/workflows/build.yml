name: Build and Publish

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew build
      - uses: actions/upload-artifact@v5
        with:
          name: build-output
          path: ./build/libs/

  publish-maven:
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[push]') || contains(github.event.head_commit.message, '[build]')
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: ./build/libs/
      - name: Publish to maven
        env:
          SAP_SECRET: ${{ secrets.SAP_SECRET }}
        run: ./gradlew publish

  publish-curseforge:
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[publish]') || contains(github.event.head_commit.message, '[curseforge]')
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: ./build/libs/
      - name: Publish To Curseforge
        env:
          CURSEFORGE_KEY: ${{ secrets.CURSEFORGE_KEY }}
        run: ./gradlew curseforge --stacktrace

  publish-modrinth:
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[publish]') || contains(github.event.head_commit.message, '[modrinth]')
    steps:
      - uses: actions/checkout@v5
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 25
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - uses: actions/download-artifact@v5
        with:
          name: build-output
          path: ./build/libs/
      - name: Publish To Modrinth
        env:
          MODRINTH_KEY: ${{ secrets.MODRINTH_KEY }}
        run: ./gradlew modrinth --stacktrace